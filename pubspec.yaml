name: habit_tracker
description: "Habit Tracker app - CastroDev Portfolio"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  google_sign_in: ^6.0.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.7.0

  # Functional programming
  fpdart: ^1.1.0

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  font_awesome_flutter: ^11.0.0
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  analyzer: ^7.7.1
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true